# UniverLab Skills Registry
#
# Skills without `requires` are always installed during Canopy setup.
# Skills with `requires` are only installed if the binary is found in PATH.
#
# Format:
#   [skills.<name>]
#   requires = "<binary>"  # optional

# Behavior family — how the agent operates (role-agnostic → role-specific)

[skills.execution-mindset]

[skills.architect-mindset]

[skills.code-engineering]

# Canopy tooling — only useful where the Canopy MCP server runs

[skills.canopy-intelligence]
requires = "canopy"

[skills.canopy-sync]
requires = "canopy"

[skills.loop-design]
requires = "canopy"

# Tool skills — bound to their CLI

[skills.texforge]
requires = "texforge"

[skills.cadspec]
requires = "cadspec"

[skills.demostage]
requires = "demo"
